[Rainmeter]
Update=1000
BackgroundMode=2
SolidColor=0,0,0,1

[Metadata]
Name=Schedule - Today & Tomorrow
Author=Noya
Version=2.0
Information=Today + Tomorrow, minimal text widget

; ==================== VARIABLES ====================
[Variables]
ColorBg=240,250,255,150
ColorText=60,80,120,255
ColorAccent=100,180,255,255
ColorDim=140,150,170,255

FontFace=Consolas
FontSize=8

Width=240
Height=180

; Dynamic variables set by Lua (do not edit)
HeaderToday=[TODAY]
HeaderTmrw=[TMRW]
Today1=
Today2=
Today3=
Today4=
Tmrw1=
Tmrw2=
Tmrw3=
Tmrw4=

; ==================== LỊCH HỌC - SỬA Ở ĐÂY ====================
; Dung tieng Anh hoac viet tat
Mon1=English
Mon2=
Mon3=Semiconductor Env
Mon4=Circuit System

Tue1=English
Tue2=
Tue3=
Tue4=

Wed1=Circuit System
Wed2=Semiconductor Env
Wed3=English
Wed4=

Thu1=
Thu2=English
Thu3=Circuit System
Thu4=Semiconductor Env

Fri1=Semiconductor Env
Fri2=
Fri3=
Fri4=

Sat1=
Sat2=
Sat3=
Sat4=

Sun1=
Sun2=
Sun3=
Sun4=

; ==================== MEASURES ====================
[ScriptSchedule]
Measure=Script
ScriptFile=#@#ScheduleMini.lua

; ==================== BACKGROUND ====================
[Background]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,6 | Fill Color #ColorBg# | StrokeWidth 1 | Stroke Color #ColorAccent#,80
X=0
Y=0

; ==================== TODAY ====================
[TodayHeader]
Meter=String
Text=#HeaderToday#
X=8
Y=8
FontFace=#FontFace#
FontSize=8
FontColor=#ColorAccent#
AntiAlias=1
FontWeight=700
DynamicVariables=1

[TodaySlot1]
Meter=String
Text=#Today1#
X=12
Y=26
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
AntiAlias=1
DynamicVariables=1

[TodaySlot2]
Meter=String
Text=#Today2#
X=12
Y=40
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
AntiAlias=1
DynamicVariables=1

[TodaySlot3]
Meter=String
Text=#Today3#
X=12
Y=54
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
AntiAlias=1
DynamicVariables=1

[TodaySlot4]
Meter=String
Text=#Today4#
X=12
Y=68
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorText#
AntiAlias=1
DynamicVariables=1

[Divider]
Meter=Shape
Shape=Line 8,0,(#Width#-16),0 | StrokeWidth 1 | Stroke Color #ColorDim#,100
X=0
Y=88

; ==================== TOMORROW ====================
[TomorrowHeader]
Meter=String
Text=#HeaderTmrw#
X=8
Y=95
FontFace=#FontFace#
FontSize=8
FontColor=#ColorDim#
AntiAlias=1
FontWeight=700
DynamicVariables=1

[TomorrowSlot1]
Meter=String
Text=#Tmrw1#
X=12
Y=110
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorDim#
AntiAlias=1
DynamicVariables=1

[TomorrowSlot2]
Meter=String
Text=#Tmrw2#
X=12
Y=124
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorDim#
AntiAlias=1
DynamicVariables=1

[TomorrowSlot3]
Meter=String
Text=#Tmrw3#
X=12
Y=138
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorDim#
AntiAlias=1
DynamicVariables=1

[TomorrowSlot4]
Meter=String
Text=#Tmrw4#
X=12
Y=152
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#ColorDim#
AntiAlias=1
DynamicVariables=1

; ==================== FOOTER ====================
[RefreshButton]
Meter=String
Text=⟳
X=(#Width#-15)
Y=(#Height#-16)
FontFace=#FontFace#
FontSize=10
FontColor=#ColorAccent#
AntiAlias=1
LeftMouseUpAction=[!Refresh]
ToolTipText=Refresh