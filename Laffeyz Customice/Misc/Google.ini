; Google Search - Dock Style
; Redesigned to match teal/mint anime aesthetic
; ----------------------------------

[Rainmeter]
Update=1000
BackgroundMode=2
SolidColor=15,25,35,180
; Semi-transparent dark background

BackgroundMargins=0,0,0,0

[Metadata]
Name=Google Dock
Author=Noya x Claude
Information=Google Search - Dock Style
License=Creative Commons BY-NC-SA 3.0
Version=2.0.0

[Variables]
fontName=Segoe UI
fontNameBold=Segoe UI Semibold
textSize=9
textSizeSmall=7

; Teal/cyan accent để match wallpaper Miku
colorAccent=0,255,220,255
colorAccentDim=0,200,170,160
colorText=255,255,255,230
colorTextDim=180,220,215,180
colorBg=12,22,32,100
colorBorder=0,255,220,60
colorHover=0,255,220,30

; ----------------------------------
; MEASURES
; ----------------------------------

[measureInput]
Measure=Plugin
Plugin=InputText
SolidColor=10,20,28,240
StringAlign=Left
StringCase=None
StringStyle=Normal
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
X=38
Y=9
W=898
H=18
FocusDismiss=1
DefaultValue=
Command1=["https://www.google.com/search?q=$UserInput$"]
UpdateDivider=86400

; ----------------------------------
; BACKGROUND SHAPE - pill/dock style
; ----------------------------------

[meterBackground]
Meter=Shape
Shape=Rectangle 0,0,960,36,10
Shape2=Rectangle 0,0,960,36,10 | StrokeWidth 1.2 | Stroke Color #colorBorder# | Fill Color #colorBg#
X=0
Y=0
W=960
H=36

; Glow line ở top — subtle highlight
[meterTopGlow]
Meter=Shape
Shape=Rectangle 8,1,944,1,0 | Fill Color 0,255,220,40 | StrokeWidth 0
X=0
Y=0
W=960
H=4

; ----------------------------------
; GOOGLE ICON (chữ G style)
; ----------------------------------

[meterIcon]
Meter=String
X=12
Y=9
W=20
H=18
FontFace=Segoe UI Semibold
FontSize=12
FontColor=#colorAccent#
AntiAlias=1
StringAlign=Left
Text=G

; ----------------------------------
; DIVIDER — ngăn icon và search
; ----------------------------------

[meterDivider]
Meter=Shape
Shape=Rectangle 0,8,1,20,0 | Fill Color 0,255,220,50 | StrokeWidth 0
X=32
Y=0

; ----------------------------------
; SEARCH PLACEHOLDER TEXT
; ----------------------------------

[meterSearchText]
Meter=String
MeterStyle=styleSearchText
X=38
Y=10
W=898
H=16
Text=Search Google...
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 1"]
MouseOverAction=[!SetOption meterSearchText FontColor "0,255,220,255"][!UpdateMeter meterSearchText][!Redraw]
MouseLeaveAction=[!SetOption meterSearchText FontColor "180,220,215,180"][!UpdateMeter meterSearchText][!Redraw]

[styleSearchText]
StringAlign=Left
StringCase=None
StringStyle=Normal
FontColor=#colorTextDim#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

; ----------------------------------
; SEARCH ICON ở bên phải
; ----------------------------------

[meterSearchIcon]
Meter=String
X=945
Y=9
W=18
H=18
FontFace=Segoe UI Symbol
FontSize=10
FontColor=#colorAccentDim#
AntiAlias=1
StringAlign=Right
Text=Search
LeftMouseUpAction=[!CommandMeasure measureInput "ExecuteBatch 1"]
