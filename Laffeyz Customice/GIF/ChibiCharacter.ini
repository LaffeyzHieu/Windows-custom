[Rainmeter]
Update=150
BackgroundMode=2
SolidColor=0,0,0,1
 
; Metadata
[Metadata]
Name=Chibi Character Widget
Author=Noya
Version=1.1 (Fixed blocking issue)
Information=Cute animated character widget
UpdateDivider=1
; Variables

[Variables]

WidgetWidth=240
WidgetHeight=240
 
; Position
PosX=(#SCREENAREAWIDTH#-260)
PosY=(#SCREENAREAHEIGHT#-260)
 
; Color Bg
ColorBg=0,0,0,0
ColorAccent=0,0,0,0
 
; Background
[BackgroundBox]
Meter=Shape
Shape=Rectangle 0,0,#WidgetWidth#,#WidgetHeight#,15 | Fill Color #ColorBg# | StrokeWidth 2 | Stroke Color #ColorAccent#
X=0
Y=0
DynamicVariables=1
 
; GIF

[MeasureFrame]
Measure=Calc
Formula=(Counter % 10)
DynamicVariables=1

[MeterCharacter]
Meter=Image
ImageName=#@#Frames\frame_0[MeasureFrame].png
X=20
Y=20
W=200
H=200
PreserveAspectRatio=1
DynamicVariables=1

; Hover effect
MouseOverAction=[!SetOption MeterCharacter Y "15"][!UpdateMeter MeterCharacter][!Redraw]
MouseLeaveAction=[!SetOption MeterCharacter Y "20"][!UpdateMeter MeterCharacter][!Redraw]
 
; Click actions
LeftMouseUpAction=["C:\Users\ASUS\Downloads\Gifs -\unavailable.gif"]
ToolTipText=Hello~ Click me!
ToolTipWidth=200
 
; Label
[LabelText]
Meter=String
Text=Noya's Companion ♡
X=(#WidgetWidth#/2)
Y=(#WidgetHeight#-15)
FontFace=Segoe UI
FontSize=9
FontColor=#ColorAccent#
StringAlign=CenterTop
AntiAlias=1
FontWeight=600
DynamicVariables=1
