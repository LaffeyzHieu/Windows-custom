[Rainmeter]
Update=50
BackgroundMode=2
SolidColor=0,0,0,1
DynamicWindowSize=1

[Metadata]
Name=Chibi - Interactive
Information=Character follows your cursor (kinda)

; ==================== VARIABLES ====================
[Variables]
CharX=100
CharY=100

; ==================== MEASURES ====================
[MeasureMouseX]
Measure=Plugin
Plugin=MouseXY
Axis=X

[MeasureMouseY]
Measure=Plugin
Plugin=MouseXY
Axis=Y

; ==================== CHARACTER ====================
[MeterCharacter]
Meter=Image
ImageName=#@#alternate.gif
X=#CharX#
Y=#CharY#
W=150
H=150
PreserveAspectRatio=1

; Smooth follow cursor (slowly move towards mouse)
; Cần Lua script để tính toán, nhưng có thể fake bằng cách:
; Click chuột ở đâu thì character nhảy đến đó

LeftMouseUpAction=[!SetVariable CharX "([MeasureMouseX]-75)"][!SetVariable CharY "([MeasureMouseY]-75)"][!UpdateMeter MeterCharacter][!Redraw]
DynamicVariables=1

; Tooltip cute
ToolTipText=Click anywhere! I'll follow~ ✨

; ==================== SHADOW (Optional) ====================
[Shadow]
Meter=Image
ImageName=#@#alternate.gif
X=(#CharX#+5)
Y=(#CharY#+5)
W=150
H=150
ImageAlpha=50
ImageTint=0,0,0
PreserveAspectRatio=1
DynamicVariables=1
