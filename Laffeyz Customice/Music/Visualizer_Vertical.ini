[Rainmeter]
Update=15
Author=Connect-R (Modified)
BackgroundMode=10
SolidColor=0,0,0,1
DynamicWindowSize=1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh] 
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.09 ? 0.09 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.09 ? 0.09 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]
LeftMouseDoubleClickAction=!ToggleConfig "Abelo\Settings" "Settings.ini"

[Variables]
@include=#@#Variables.inc
Scale=0.34
AverageSize=8

;-------------------------------------------------------------
[MeasureAudioOutput]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=4096
FFTOverlap=2048
FFTAttack=0
FFTDecay=150
FreqMin=100
FreqMax=16500
Sensitivity=35
Bands=241

;-------------------------------------------------------------
[MeterStyle]
BarOrientation=Horizontal
X=(0*#Scale#)
Y=(12*#Scale#)r
W=(600*#Scale#)
H=(6*#Scale#)
Flip=1

;-------------------------------------------------------------

