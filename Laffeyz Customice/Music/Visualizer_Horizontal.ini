[Rainmeter]
Update=15
Author=Connect-R (Modified)
BackgroundMode=10
SolidColor=0,0,0,1
DynamicWindowSize=1
MouseScrollUpAction=[!SetVariable Scale "(#Scale#+#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#+#ScrollMouseIncrement#)"][!Refresh] 
MouseScrollDownAction=[!SetVariable Scale "(#Scale#-#ScrollMouseIncrement# < 0.09 ? 0.09 : #Scale#-#ScrollMouseIncrement#)"][!WriteKeyValue Variables Scale "(#Scale#-#ScrollMouseIncrement# < 0.09 ? 0.09 : #Scale#-#ScrollMouseIncrement#)"][!Refresh]
LeftMouseDoubleClickAction=!ToggleConfig "Abelo\Settings" "Settings.ini"

[Variables]
@include=#@#Variables.inc
Scale=0.57
AverageSize=8

;-------------------------------------------------------------
[MeasureAudioOutput]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=4096
FFTOverlap=2048
FFTAttack=0
FFTDecay=150
FreqMin=100
FreqMax=16500
Sensitivity=35
Bands=100

;-------------------------------------------------------------
; MeterStyle cho Horizontal layout
; W = chiều rộng mỗi bar, H = chiều cao tối đa (bar phát triển lên/xuống)
; X dùng 'r' (relative) để tự động offset sang phải
; Y cố định (top of widget)
[MeterStyle]
BarOrientation=Vertical
X=(5*#Scale#)r
Y=(0*#Scale#)
W=(4*#Scale#)
H=(300*#Scale#)
Flip=0

;-------------------------------------------------------------

[Measure001]
Measure=Plugin
Plugin=AudioLevel
Parent=MeasureAudioOutput
Type=Band
